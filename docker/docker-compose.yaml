services:
  keyboard_joy:
    image: keyboard_joy:jazzy
    container_name: keyboard_joy
    build:
      context: ..
      dockerfile: docker/Dockerfile
    environment:
      ROS_DOMAIN_ID: ${ROS_DOMAIN_ID:-0}
      WAYLAND_DISPLAY: ${WAYLAND_DISPLAY:-wayland-0}
    volumes:
      - /run/user/$(id -u)/wayland-0:/run/user/1000/wayland-0:rw
      - ../src/keyboard_joy:/root/ros2_ws/src/keyboard_joy:ro
    network_mode: host
    stdin_open: true
    tty: true
    privileged: true
    command: >
      bash -c "source /root/ros2_ws/install/setup.bash && ros2 run keyboard_joy joy_node"
